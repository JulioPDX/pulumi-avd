aaa_authorization:
  exec:
    default: local
aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1
  description: P2P_spine1_Ethernet1
  shutdown: false
  mtu: 9214
  ip_address: 10.255.255.1/31
  metadata:
    peer: spine1
    peer_interface: Ethernet1
    peer_type: spine
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_spine2_Ethernet1
  shutdown: false
  mtu: 9214
  ip_address: 10.255.255.3/31
  metadata:
    peer: spine2
    peer_interface: Ethernet1
    peer_type: spine
  switchport:
    enabled: false
hostname: leaf1
ip_domain_lookup:
  source_interfaces:
  - name: Management1
    vrf: MGMT
ip_igmp_snooping:
  globally_enabled: true
ip_name_server:
  vrfs:
  - name: MGMT
    servers:
    - ip_address: 8.8.8.8
    - ip_address: 8.8.4.4
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:00:01
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$9334ee85e63a6df2$9gu9bIpZ39eQwJpdvnmEpPObk4BPRcg9rE.drNR.iuyZKNJJhWqlnk86kH9Ly24wlF8gi.pyimL9cxHUQb3SY.
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.3/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.255.1.3/32
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 172.16.1.101/24
  type: oob
  gateway: 172.16.1.1
metadata:
  is_deployed: true
  platform: cEOSLab
  fabric_name: FABRIC
  validate_hardware:
    enabled: false
ntp:
  local_interface:
    name: Management1
    vrf: MGMT
  servers:
  - name: time.google.com
    iburst: true
    preferred: true
  vrf: MGMT
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/27 eq 32
  - sequence: 20
    action: permit 10.255.1.0/27 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65001'
  router_id: 10.255.0.3
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.255.0
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: spine1
    description: spine1_Ethernet1
  - ip_address: 10.255.255.2
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: spine2
    description: spine2_Ethernet1
  - ip_address: 10.255.0.1
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: spine1
    description: spine1_Loopback0
  - ip_address: 10.255.0.2
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: spine2
    description: spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 16384
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.16.1.1
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: MGMT
  ip_routing: false
vxlan_interface:
  vxlan1:
    description: leaf1_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
