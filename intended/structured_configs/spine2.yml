aaa_authorization:
  exec:
    default: local
aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1
  description: P2P_leaf1_Ethernet2
  shutdown: false
  mtu: 9214
  ip_address: 10.255.255.2/31
  metadata:
    peer: leaf1
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_leaf2_Ethernet2
  shutdown: false
  mtu: 9214
  ip_address: 10.255.255.6/31
  metadata:
    peer: leaf2
    peer_interface: Ethernet2
    peer_type: l3leaf
  switchport:
    enabled: false
hostname: spine2
ip_domain_lookup:
  source_interfaces:
  - name: Management1
    vrf: MGMT
ip_name_server:
  vrfs:
  - name: MGMT
    servers:
    - ip_address: 8.8.8.8
    - ip_address: 8.8.4.4
ip_routing: true
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$86c25800735464c1$wpHn5BO0gomqNcM8kK34U5mQy0A.N3n/HcCsZwzQ44/tEGsjbH6DJEHHCUhHHzRSHMnWEEBj7xys0KsLsCL2r0
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.2/32
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 172.16.1.12/24
  type: oob
  gateway: 172.16.1.1
metadata:
  is_deployed: true
  platform: cEOSLab
  fabric_name: FABRIC
  validate_hardware:
    enabled: false
ntp:
  local_interface:
    name: Management1
    vrf: MGMT
  servers:
  - name: time.google.com
    iburst: true
    preferred: true
  vrf: MGMT
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/27 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65100'
  router_id: 10.255.0.2
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.255.3
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65001'
    metadata:
      peer: leaf1
    description: leaf1_Ethernet2
  - ip_address: 10.255.255.7
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65002'
    metadata:
      peer: leaf2
    description: leaf2_Ethernet2
  - ip_address: 10.255.0.3
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65001'
    metadata:
      peer: leaf1
    description: leaf1_Loopback0
  - ip_address: 10.255.0.4
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65002'
    metadata:
      peer: leaf2
    description: leaf2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: none
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 172.16.1.1
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: MGMT
  ip_routing: false
