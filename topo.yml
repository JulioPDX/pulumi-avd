---
name: lab
prefix: ""

mgmt:
    network: custom_mgmt
    ipv4-subnet: 172.16.1.0/24

topology:
    kinds:
      arista_ceos:
        image: ceos:4.35.1F
        binds:
          - interface_mapping.json:/mnt/flash/EosIntfMapping.json:ro
        env:
          CLAB_MGMT_VRF: MGMT

    defaults:
        kind: arista_ceos
    nodes:
        pulumi-spine1:
            mgmt-ipv4: 172.16.1.11
        pulumi-spine2:
            mgmt-ipv4: 172.16.1.12
        pulumi-leaf1:
            mgmt-ipv4: 172.16.1.101
        pulumi-leaf2:
            mgmt-ipv4: 172.16.1.102
    links:
        # spines to a/b leafs
        - endpoints: ["pulumi-spine1:eth1", "pulumi-leaf1:eth1"]
        - endpoints: ["pulumi-spine1:eth2", "pulumi-leaf2:eth1"]
        - endpoints: ["pulumi-spine2:eth1", "pulumi-leaf1:eth2"]
        - endpoints: ["pulumi-spine2:eth2", "pulumi-leaf2:eth2"]
