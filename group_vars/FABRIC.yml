---
# Fabric Name - must match the Ansible inventory group name
fabric_name: FABRIC

# Spine and Leaf Layer3 Routing
underlay_routing_protocol: ebgp
overlay_routing_protocol: ebgp

# Management Interface
mgmt_gateway: 172.16.1.1
mgmt_interface_vrf: MGMT

# Management API HTTP
management_eapi:
  enabled: true

# AAA Settings (AVD 6.x format)
aaa_settings:
  local_users:
    - name: admin
      privilege: 15
      role: network-admin
      cleartext_password: admin
  authorization:
    exec:
      default: local

# NTP Settings (AVD 6.x format)
ntp_settings:
  servers:
    - name: time.google.com
      iburst: true

# DNS Settings (AVD 6.x format)
dns_settings:
  servers:
    - ip_address: 8.8.8.8
    - ip_address: 8.8.4.4

cv_settings:
  cvaas:
    enabled: true
    clusters:
      - name: cvaas
        region: staging
        vrf: MGMT
  terminattr:
    disable_aaa: true

ansible_connection: ansible.netcommon.httpapi
# Specifies that we are indeed using Arista EOS
ansible_network_os: arista.eos.eos
# This user/password must exist on the switches to enable Ansible access
ansible_user: admin
ansible_password: admin
# User escalation (to enter enable mode)
ansible_become: true
ansible_become_method: enable
ansible_httpapi_use_ssl: true
ansible_httpapi_validate_certs: false
